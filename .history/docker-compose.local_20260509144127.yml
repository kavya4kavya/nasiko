# Unified Docker Compose for Local Nasiko Development
# Optimized for Buildthon: Includes Resilient Request Layer & Redis Stack
services:
  # ============================================================================
  # INFRASTRUCTURE LAYER (MongoDB, Redis Stack)
  # ============================================================================
  mongodb:
    image: docker.io/library/mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    # Essential for Semantic Caching: provides RediSearch/Vector similarity
    image: redis/redis-stack:latest 
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001" # Redis Insight Dashboard (GUI)
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # CORE SERVICES LAYER (Backend)
  # ============================================================================
  nasiko-backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: nasiko-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGO_NASIKO_USER: admin
      MONGO_NASIKO_PASSWORD: password
      MONGO_NASIKO_HOST: mongodb
      MONGO_NASIKO_PORT: "27017"
      MONGO_NASIKO_DATABASE: nasiko
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
      USER_CREDENTIALS_ENCRYPTION_KEY: ${USER_CREDENTIALS_ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AUTH_SERVICE_URL: http://nasiko-auth-service:8001
    volumes:
      - ./agents:/app/agents
      - ./app:/app/app
    networks:
      - app-network
      - agents-net

  # ============================================================================
  # AUTH SERVICE LAYER
  # ============================================================================
  nasiko-auth-service:
    image: docker.io/karannasiko/nasiko-auth:latest
    container_name: nasiko-auth-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://admin:password@mongodb:27017
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key
      PORT: "8001"
    ports:
      - "8082:8001"
    networks:
      - app-network

  # ============================================================================
  # GATEWAY LAYER (Kong + Service Registry)
  # ============================================================================
  kong-database:
    image: postgres:13
    container_name: kong-database
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:3.4
    container_name: kong-migrations
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PASSWORD: kong
    networks:
      - app-network
    command: kong migrations bootstrap

  kong-gateway:
    image: kong:3.4
    container_name: kong-gateway
    restart: unless-stopped
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PASSWORD: kong
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      # Note: chat-logger removed to prevent crash if plugin directory missing
      KONG_PLUGINS: bundled 
    ports:
      - "9100:8000" # Proxy
      - "9101:8001" # Admin
    networks:
      - app-network
      - agents-net

  kong-service-registry:
    build:
      context: ./agent-gateway/registry
      dockerfile: Dockerfile
    container_name: kong-service-registry
    restart: unless-stopped
    depends_on:
      kong-gateway:
        # Changed to service_started to bypass healthcheck loops during dev
        condition: service_started 
    environment:
      KONG_ADMIN_URL: http://kong-gateway:8001
      DOCKER_SOCKET: /var/run/docker.sock
      AGENTS_NETWORK: agents-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    networks:
      - app-network
      - agents-net

  # ============================================================================
  # BUILDTHON CHALLENGE: Resilient Request Layer
  # ============================================================================
  resilient-layer:
    build:
      context: .
      dockerfile: Dockerfile 
    container_name: resilient-layer
    restart: unless-stopped
    ports:
      - "8090:8090" # The external entry point for your tests
    depends_on:
      redis:
        condition: service_healthy
      kong-gateway:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379
      - KONG_URL=http://kong-gateway:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - app-network

  # ============================================================================
  # WEB FRONTEND LAYER
  # ============================================================================
  nasiko-web:
    image: docker.io/karannasiko/nasiko-web:oss
    container_name: nasiko-web
    restart: unless-stopped
    ports:
      - "4000:4000"
    networks:
      - app-network

volumes:
  mongodb-data:
  redis-data:
  kong-db-data:

networks:
  app-network:
    driver: bridge
    name: app-network
  agents-net:
    driver: bridge
    name: agents-net